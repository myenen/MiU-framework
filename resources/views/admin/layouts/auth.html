<!DOCTYPE html>
<html lang="{current_locale}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{admin_login_title}</title>
    <link rel="stylesheet" href="{assets_url}/vendor/bootstrap/css/bootstrap.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: #e5eefc;
            background:
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 24%),
                linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }

        .auth-card {
            width: min(100%, 460px);
            padding: 28px;
            border-radius: 22px;
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <main class="auth-card">{content}</main>
    <script src="{assets_url}/vendor/jquery/jquery.min.js"></script>
    <script src="{assets_url}/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{admin_login_badge}</div>
<h1 style="margin:8px 0 10px; font-size:38px;">{admin_login_title}</h1>
<p style="margin:0 0 22px; color:#cbd5e1;">{admin_login_description}</p>

<div style="margin:0 0 18px; min-height:24px; color:#fca5a5;">{error_message}</div>

<form method="post" action="/admin/login">
    <input type="hidden" name="_token" value="{csrf_token}">
    <label for="email" style="display:block; margin-bottom:8px; color:#94a3b8;">{email_label}</label>
    <input id="email" name="email" type="email" value="{old_email}" style="width:100%; margin-bottom:16px; padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
    <div style="margin:-8px 0 12px; min-height:18px; color:#fca5a5; font-size:13px;">{email_error}</div>

    <label for="password" style="display:block; margin-bottom:8px; color:#94a3b8;">{password_label}</label>
    <input id="password" name="password" type="password" style="width:100%; margin-bottom:18px; padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
    <div style="margin:-10px 0 12px; min-height:18px; color:#fca5a5; font-size:13px;">{password_error}</div>

    <button type="submit" style="width:100%; padding:12px 16px; border-radius:12px; border:0; background:#22c55e; color:#052e16; font-weight:700; cursor:pointer;">{login_button}</button>
</form>

<div style="margin-top:18px; color:#94a3b8; font-size:13px;">
    {demo_account_label}: admin@example.com / 123456
</div>

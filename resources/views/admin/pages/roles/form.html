<section style="background: rgba(17, 24, 39, 0.88); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 22px; padding: 28px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;">
        <div>
            <div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{{Rol duzenleme}}</div>
            <h1 style="margin:8px 0 0; font-size:36px;">{{Rol}} #{role_id}</h1>
        </div>
        <a href="/admin/roles" style="display:inline-block; padding:11px 16px; border-radius:12px; background:#1f2937; color:#f8fafc; text-decoration:none; border:1px solid rgba(148,163,184,.18);">{{Listeye don}}</a>
    </div>

    <div style="margin-top:18px;">{alert_html}</div>

    <form method="post" action="{form_action}" style="margin-top:20px; display:grid; gap:18px;">
        <input type="hidden" name="_token" value="{csrf_token}">

        <label style="display:grid; gap:8px;">
            <span>{{Rol adi}}</span>
            <input type="text" name="name" value="{role_name}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
        </label>

        <div style="display:grid; gap:12px;">
            <div>{{Yetkiler}}</div>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:14px;">{permission_groups_html}</div>
            <small style="color:#94a3b8;">{{Yetkiler artik view, edit ve delete bazli secilir.}}</small>
        </div>

        <div>
            <button type="submit" style="padding:12px 18px; border-radius:12px; border:none; background:#16a34a; color:#f8fafc; cursor:pointer;">{{Rolu kaydet}}</button>
        </div>
    </form>
</section>

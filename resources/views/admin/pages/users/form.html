<section style="background: rgba(17, 24, 39, 0.88); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 22px; padding: 28px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;">
        <div>
            <div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{{Kullanici formu}}</div>
            <h1 style="margin:8px 0 0; font-size:36px;">{form_title}</h1>
        </div>
        <a href="/admin/users" style="display:inline-block; padding:11px 16px; border-radius:12px; background:#1f2937; color:#f8fafc; text-decoration:none; border:1px solid rgba(148,163,184,.18);">{{Listeye don}}</a>
    </div>

    <div style="margin-top:18px;">{alert_html}</div>

    <form method="post" action="{form_action}" style="margin-top:20px; display:grid; gap:18px;">
        <input type="hidden" name="_token" value="{csrf_token}">

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
            <label style="display:grid; gap:8px;">
                <span>{{Ad}}</span>
                <input type="text" name="name" value="{name_value}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
            </label>
            <label style="display:grid; gap:8px;">
                <span>{{Soyad}}</span>
                <input type="text" name="surname" value="{surname_value}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
            </label>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
            <label style="display:grid; gap:8px;">
                <span>{{E-posta}}</span>
                <input type="email" name="email" value="{email_value}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
            </label>
            <label style="display:grid; gap:8px;">
                <span>{{Sifre}}</span>
                <input type="password" name="password" {password_required} style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
                <small style="color:#94a3b8;">{password_help}</small>
            </label>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
            <label style="display:grid; gap:8px;">
                <span>{{Rol}}</span>
                <select name="role" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">{role_options_html}</select>
            </label>
            <label style="display:grid; gap:8px;">
                <span>{{Durum}}</span>
                <select name="status" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">{status_options_html}</select>
            </label>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
            <label style="display:grid; gap:8px;">
                <span>{{Telefon}}</span>
                <input type="text" name="phone" value="{phone_value}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
            </label>
            <label style="display:grid; gap:8px;">
                <span>{{Sehir}}</span>
                <input type="text" name="city" value="{city_value}" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
            </label>
        </div>

        <label style="display:grid; gap:8px;">
            <span>{{Adres}}</span>
            <textarea name="address" rows="4" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">{address_value}</textarea>
        </label>

        <div>
            <button type="submit" style="padding:12px 18px; border-radius:12px; border:none; background:#16a34a; color:#f8fafc; cursor:pointer;">{submit_label}</button>
        </div>
    </form>
</section>

<section style="background: rgba(17, 24, 39, 0.88); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 22px; padding: 28px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);">
    <div>
        <div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{{Log merkezi}}</div>
        <h1 style="margin:8px 0 0; font-size:36px;">{{Istek loglari}}</h1>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-top:22px;">
        <div style="background:#1f2937; border:1px solid rgba(148, 163, 184, 0.18); border-radius:18px; padding:20px;">
            <div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{{Toplam log}}</div>
            <div style="font-size:34px; margin-top:10px; font-weight:700;">{summary_total}</div>
        </div>
        <div style="background:#1f2937; border:1px solid rgba(148, 163, 184, 0.18); border-radius:18px; padding:20px;">
            <div style="color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:.12em;">{{Hata logu}}</div>
            <div style="font-size:34px; margin-top:10px; font-weight:700;">{summary_errors}</div>
        </div>
    </div>

    <form method="get" action="/admin/logs" style="margin-top:18px; display:grid; grid-template-columns:2fr 1fr 1fr auto; gap:12px; align-items:end;">
        <label style="display:grid; gap:8px;">
            <span>{{Arama}}</span>
            <input type="text" name="q" value="{filter_query}" placeholder="Path, ip, hata..." style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
        </label>
        <label style="display:grid; gap:8px;">
            <span>{{Method}}</span>
            <input type="text" name="method" value="{filter_method}" placeholder="GET" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
        </label>
        <label style="display:grid; gap:8px;">
            <span>{{Status}}</span>
            <input type="text" name="status" value="{filter_status}" placeholder="500" style="padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,.18); background:#0f172a; color:#f8fafc;">
        </label>
        <button type="submit" style="padding:12px 18px; border-radius:12px; border:none; background:#2563eb; color:#f8fafc; cursor:pointer;">{{Filtrele}}</button>
    </form>

    <div style="margin-top:22px; overflow:auto; border:1px solid rgba(148, 163, 184, 0.18); border-radius:18px;">
        <table style="width:100%; border-collapse:collapse; min-width:980px; background:#0f172a;">
            <thead>
                <tr style="background:#111827; color:#94a3b8; text-align:left;">
                    <th style="padding:14px;">ID</th>
                    <th style="padding:14px;">{{Method}}</th>
                    <th style="padding:14px;">{{Path}}</th>
                    <th style="padding:14px;">{{Status}}</th>
                    <th style="padding:14px;">{{IP}}</th>
                    <th style="padding:14px;">{{Tarih}}</th>
                    <th style="padding:14px;">{{Detay}}</th>
                </tr>
            </thead>
            <tbody>{logs_rows_html}</tbody>
        </table>
    </div>
</section>

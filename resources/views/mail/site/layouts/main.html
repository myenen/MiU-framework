<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{subject}</title>
</head>
<body style="margin:0; padding:24px; background:#f5efe4; font-family:Arial, sans-serif; color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px; margin:0 auto; background:#fffdf9; border:1px solid #e7d8c1; border-radius:18px;">
        <tr>
            <td style="padding:28px 28px 12px;">
                <div style="font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#b45309;">{app_name}</div>
            </td>
        </tr>
        <tr>
            <td style="padding:0 28px 28px;">
                {content}
            </td>
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{subject}</title>
</head>
<body style="margin:0; padding:24px; background:#020617; font-family:Arial, sans-serif; color:#e5eefc;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px; margin:0 auto; background:#0f172a; border:1px solid rgba(148,163,184,.18); border-radius:18px;">
        <tr>
            <td style="padding:24px 28px 10px;">
                <div style="font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#22c55e;">{app_name}</div>
            </td>
        </tr>
        <tr>
            <td style="padding:0 28px 28px;">
                {content}
            </td>
        </tr>
    </table>
</body>
</html>

<section style="max-width:520px; margin:0 auto; background: rgba(255,255,255,.74); border: 1px solid #e5d7c5; border-radius: 20px; padding: 32px; box-shadow: 0 20px 60px rgba(31, 41, 55, 0.08);">
    <div style="color:#b45309; font-size:13px; letter-spacing:.16em; text-transform:uppercase; margin-bottom:12px;">{{Site login}}</div>
    <h1 style="margin:0 0 12px; font-size: clamp(28px, 5vw, 44px);">{{Kullanici girisi}}</h1>
    <p style="margin:0 0 22px; color:#6b7280;">{{Site hesabinizla giris yapin}}</p>

    <div style="margin:0 0 18px; min-height:24px; color:#dc2626;">{error_message}</div>

    <form method="post" action="/login">
        <input type="hidden" name="_token" value="{csrf_token}">
        <label for="email" style="display:block; margin-bottom:8px; color:#6b7280;">{{E-posta}}</label>
        <input id="email" name="email" type="email" value="{old_email}" style="width:100%; margin-bottom:16px; padding:12px 14px; border-radius:12px; border:1px solid #d1d5db; background:#fff; color:#111827;">
        <div style="margin:-8px 0 12px; min-height:18px; color:#dc2626; font-size:13px;">{email_error}</div>

        <label for="password" style="display:block; margin-bottom:8px; color:#6b7280;">{{Sifre}}</label>
        <input id="password" name="password" type="password" style="width:100%; margin-bottom:18px; padding:12px 14px; border-radius:12px; border:1px solid #d1d5db; background:#fff; color:#111827;">
        <div style="margin:-10px 0 12px; min-height:18px; color:#dc2626; font-size:13px;">{password_error}</div>

        <button type="submit" style="width:100%; padding:12px 16px; border-radius:12px; border:0; background:#16a34a; color:#f0fdf4; font-weight:700; cursor:pointer;">{{Giris yap}}</button>
    </form>
</section>
